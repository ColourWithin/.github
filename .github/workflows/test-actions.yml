name: Test composite actions

on:
  pull_request:
    branches:
      - main
    paths:
      - 'actions/**'
      - 'docs/actions/**'
      - 'README.md'
      - '.github/workflows/test-actions.yml'

jobs:
  unit-tests:
    name: Unit tests and lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cache Python dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('actions/oci-token-exchange/requirements.txt', 'actions/oci-token-exchange/pyproject.toml') }}

      - name: Install test dependencies
        shell: bash
        run: pip install 'oci>=2.173.1,<3' requests cryptography pytest ruff

      - name: Ruff lint
        shell: bash
        run: ruff check actions/oci-token-exchange/

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.12"
          ACTIONLINT_ARCHIVE="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -Lo actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${ACTIONLINT_ARCHIVE}"
          printf '%s  %s\n' \
            '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8' \
            'actionlint.tar.gz' | sha256sum -c
          tar -xzf actionlint.tar.gz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          rm -f actionlint.tar.gz

      - name: Actionlint (workflow files only)
        shell: bash
        run: actionlint .github/workflows/test-actions.yml

      - name: Lint - third-party actions are SHA pinned
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          uses_line = re.compile(r"^\s*uses:\s*([^#\s]+)")
          sha_ref = re.compile(r"@[0-9a-f]{40}$")
          failures = []

          for path in sorted(Path(".github/workflows").glob("*.yml")):
              for line_no, line in enumerate(path.read_text().splitlines(), start=1):
                  match = uses_line.match(line)
                  if not match:
                      continue
                  value = match.group(1).strip("'\"")
                  if value.startswith("./"):
                      continue
                  if not sha_ref.search(value):
                      failures.append(f"{path}:{line_no}: {value}")

          if failures:
              for failure in failures:
                  print(f"::error::{failure} is not pinned to [0-9a-f]{{40}}")
              raise SystemExit(1)

          print("OK: third-party actions are SHA pinned")
          PY

      - name: Lint - no local real OCI smoke in .github repo
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path(".github/workflows/test-actions.yml").read_text()
          action_ref = "oci-token" + "-exchange"
          client_identifier = "OCI_OIDC_CLIENT" + "_IDENTIFIER"

          if action_ref in text and client_identifier in text:
              print("::error::.github workflows must not run real OCI token exchange locally")
              raise SystemExit(1)

          print("OK: no local real OCI smoke in .github repo")
          PY

      - name: Lint - no set -x in action source
        shell: bash
        run: |
          if grep -rn 'set -x\|set -o xtrace' \
            actions/*/action.yml \
            actions/*/*.py \
            actions/*/src/; then
            echo "::error::Found set -x or set -o xtrace in action source. Remove before merging."
            exit 1
          fi

      - name: Lint - no inputs interpolation in composite action run bodies
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("actions/oci-token-exchange/action.yml")
          lines = path.read_text().splitlines()
          findings = []
          needle = "$" + "{{ inputs."

          for index, line in enumerate(lines):
              stripped = line.lstrip()
              if not (
                  stripped == "run: |"
                  or stripped.startswith("run: |-")
                  or stripped.startswith("run: |+")
              ):
                  continue
              run_indent = len(line) - len(stripped)
              for body_index in range(index + 1, len(lines)):
                  body = lines[body_index]
                  if body.strip() == "":
                      continue
                  body_indent = len(body) - len(body.lstrip())
                  if body_indent <= run_indent:
                      break
                  if needle in body:
                      findings.append((body_index + 1, body.strip()))

          if findings:
              for line_no, text in findings:
                  print(
                      f"::error file={path},line={line_no}::"
                      "Found $" + "{{ inputs.* }} in action.yml run: body: " + text
                  )
              raise SystemExit(1)
          print("OK: no inputs interpolation in action.yml run bodies")
          PY

      - name: Pytest unit tests
        shell: bash
        run: pytest actions/oci-token-exchange/tests/ -v

      - name: Install run-oci-cli-command npm dependencies
        shell: bash
        working-directory: actions/run-oci-cli-command
        run: npm ci

      - name: Run run-oci-cli-command tests
        shell: bash
        working-directory: actions/run-oci-cli-command
        run: npm test -- --run

      - name: TypeScript typecheck
        shell: bash
        working-directory: actions/run-oci-cli-command
        run: npm run typecheck

      - name: npm audit
        shell: bash
        working-directory: actions/run-oci-cli-command
        run: npm audit --audit-level=high

      - name: Runtime dependency license allowlist
        shell: bash
        working-directory: actions/run-oci-cli-command
        run: npm run licenses

      - name: Build run-oci-cli-command bundle
        shell: bash
        working-directory: actions/run-oci-cli-command
        run: npm run build

      - name: Verify run-oci-cli-command bundle is fresh
        shell: bash
        run: git diff --exit-code -- actions/run-oci-cli-command/dist/index.js

      - name: Lint - no shell execution in TypeScript action source
        shell: bash
        run: |
          if grep -rE "child_process\.exec\b|execSync\b|shell: true" actions/run-oci-cli-command/src/; then
            echo "::error::Found shell execution primitive in run-oci-cli-command source."
            exit 1
          fi
