[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "S", "B"]
ignore = [
    "S101",  # assert statements are fine in tests
    "S603",  # subprocess calls are not used here, but harmless to silence
]
